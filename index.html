<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FuelNav Pro - MID Edition</title>
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1e293b">
    <style>
        :root {
            --bg: #f8fafc;
            --card: #ffffff;
            --primary: #1e293b;
            --accent: #10b981;
            --text-main: #334155;
            --text-muted: #64748b;
            --mid-bg: #0f172a;
            --mid-text: #38bdf8;
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg); color: var(--text-main); 
            margin: 0; padding: 15px; display: flex; justify-content: center; 
        }
        .app-container { width: 100%; max-width: 450px; }
        header { text-align: center; margin-bottom: 20px; }
        header h1 { font-size: 1.5rem; color: var(--primary); margin: 0; }
        
        /* --- Desain Layar MID Mobil --- */
        .mid-display {
            background: var(--mid-bg);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8), 0 4px 10px rgba(0,0,0,0.2);
            border: 2px solid #334155;
            font-family: 'Courier New', Courier, monospace;
        }
        .mid-top {
            display: flex;
            justify-content: space-between;
            margin-bottom: 25px;
        }
        .mid-data { text-align: center; width: 45%; }
        .mid-label { 
            font-size: 0.75rem; color: #94a3b8; 
            letter-spacing: 2px; display: block; margin-bottom: 5px;
        }
        .mid-value-container {
            display: flex; align-items: baseline; justify-content: center; gap: 5px;
        }
        .mid-value { font-size: 2.2rem; font-weight: bold; color: var(--mid-text); text-shadow: 0 0 5px rgba(56, 189, 248, 0.5); }
        .mid-unit { font-size: 0.9rem; color: var(--mid-text); }
        
        .mid-gauge-container { display: flex; align-items: center; gap: 10px; }
        .fuel-icon { font-size: 1.2rem; color: #94a3b8; font-weight: bold;}
        .fuel-icon.red { color: #ef4444; }
        .fuel-bars { display: flex; flex: 1; gap: 4px; }
        .bar { 
            flex: 1; height: 18px; background: #1e293b; 
            border-radius: 2px; transition: 0.3s ease-in-out; 
        }
        .bar.active { background: #10b981; box-shadow: 0 0 5px #10b981; }
        .bar.warning { background: #ef4444; box-shadow: 0 0 5px #ef4444; }
        /* ------------------------------ */

        .card { 
            background: var(--card); padding: 20px; border-radius: 16px; 
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); margin-bottom: 15px; 
        }
        .card-title { 
            font-size: 0.85rem; font-weight: 700; color: var(--text-muted); 
            text-transform: uppercase; margin-bottom: 15px; display: block; 
            letter-spacing: 0.05em;
        }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 0.8rem; font-weight: 600; margin-bottom: 5px; }
        input, select { 
            width: 100%; padding: 12px; border: 1px solid #e2e8f0; 
            border-radius: 10px; font-size: 1rem; box-sizing: border-box; 
            background: #fff; color: var(--text-main);
        }
        button { 
            width: 100%; padding: 15px; border-radius: 12px; border: none; 
            font-weight: 700; font-size: 1rem; cursor: pointer; transition: 0.2s; 
        }
        button:active { transform: scale(0.98); opacity: 0.9; }
        .btn-save { background: var(--primary); color: white; margin-bottom: 10px; }
        .btn-calc { background: var(--accent); color: white; }
        .result-box { 
            margin-top: 15px; display: none; border-top: 2px dashed #e2e8f0; 
            padding-top: 15px; animation: fadeIn 0.3s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .res-item { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 0.95rem; }
        .res-val { font-weight: 700; color: var(--primary); }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <h1>FuelNav Pro</h1>
    </header>

    <div class="mid-display">
        <div class="mid-top">
            <div class="mid-data">
                <span class="mid-label">RANGE</span>
                <div class="mid-value-container">
                    <span class="mid-value" id="midRange">---</span>
                    <span class="mid-unit">km</span>
                </div>
            </div>
            <div class="mid-data">
                <span class="mid-label">AVG</span>
                <div class="mid-value-container">
                    <span class="mid-value" id="midAvg">--.-</span>
                    <span class="mid-unit">km/L</span>
                </div>
            </div>
        </div>
        <div class="mid-gauge-container">
            <span class="fuel-icon" id="iconE">E</span>
            <div class="fuel-bars" id="fuelBars">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            <span class="fuel-icon">F</span>
        </div>
    </div>

    <div class="card">
        <span class="card-title">Profil Kendaraan</span>
        <div class="grid">
            <div class="input-group">
                <label>Kapasitas Tangki (L)</label>
                <input type="number" id="tankTotal" placeholder="Contoh: 45">
            </div>
            <div class="input-group">
                <label>Konsumsi (Km/L)</label>
                <input type="number" id="avgCons" placeholder="Contoh: 11">
            </div>
        </div>
        <div class="input-group">
            <label>Rute Harian PP (Km)</label>
            <input type="number" id="dailyCommute" placeholder="Contoh: 37">
        </div>
        <button class="btn-save" onclick="saveProfile()">Simpan Profil</button>
    </div>

    <div class="card">
        <span class="card-title">Kalkulator Pengisian</span>
        <div class="grid">
            <div class="input-group">
                <label>Merek BBM</label>
                <select id="fBrand" onchange="updateFuelTypes()">
                    <option value="">Pilih...</option>
                    <option value="Pertamina">Pertamina</option>
                    <option value="Shell">Shell</option>
                    <option value="Vivo">Vivo</option>
                    <option value="BP">BP</option>
                </select>
            </div>
            <div class="input-group">
                <label>Jenis BBM</label>
                <select id="fType" onchange="loadSavedPrice()">
                    <option value="">Pilih Merek...</option>
                </select>
            </div>
        </div>
        
        <div class="grid">
            <div class="input-group">
                <label>Harga / Liter (Rp)</label>
                <input type="number" id="fuelPrice" placeholder="Ketik Harga...">
            </div>
            <div class="input-group">
                <label>Sisa Bensin (Liter)</label>
                <input type="number" id="tankCurrent" step="0.001" placeholder="Contoh: 28.125">
            </div>
        </div>
        
        <button class="btn-calc" onclick="calculate()">Proses Ke MID</button>

        <div id="resultBox" class="result-box">
            <div class="res-item">Daya Tahan Komuter: <span class="res-val" id="resDays">-</span></div>
            <div class="res-item">Biaya Isi Penuh: <span class="res-val" id="resCost">-</span></div>
        </div>
    </div>
</div>
